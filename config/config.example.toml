# Scribe Configuration Example
#
# Copy this to ~/.config/scribe/config.toml or ~/.scribe/config.toml

[scribe]
# LLM Endpoint — any llama-server, Ollama, LM Studio
base_url = "http://127.0.0.1:18083/v1"

# Model name. "default" auto-detects the server's loaded model (works for
# llama.cpp, Ollama and LM Studio). Set explicitly for cloud providers.
model = "default"

# API key (llama.cpp doesn't need this, use "not-needed"; cloud providers do).
# Prefer the SCRIBE_API_KEY env var over storing a real key here.
api_key = "not-needed"

# Optional: Brave Search API key for the web_search tool. Without it, search
# falls back to DuckDuckGo (no key needed).
# brave_api_key = "BSA..."

# System prompt shown to the model
system_prompt = "You are Scribe, an autonomous research and writing agent..."

# Enable memory systems
sme_enabled = true
rag_enabled = true

# Reasoning (Peirce chain runs as hidden thinking, answer stays short).
#   false  = model answers directly, no thinking (default).
#   true   = model thinks before answering.
#   "auto" = the reasoning gate decides per request: small talk answers
#            instantly, debugging/planning/long prompts get a thinking pass.
# Toggle live in TUI and web chat with the /reasoning command.
reasoning = false

# GBNF tool-call enforcement (llama.cpp servers only; ignored elsewhere):
#   "auto"  = if the model emits a malformed tool call, retry that one request
#             with a grammar that makes invalid output impossible (default).
#   "force" = grammar-constrain every forced tool decision.
#   "off"   = disable.
tool_grammar = "auto"

# HOW thinking is produced when reasoning is on:
#   "native" = server-side via enable_thinking (llama.cpp gemma).
#   "prompt" = the model writes the <think> block itself. Use this for servers
#              without chat_template_kwargs (Ollama, LM Studio, ...).
reasoning_mode = "native"

# Local working directory Scribe operates in (created on start). The model is
# told it runs locally here, so it stops claiming it is a cloud/isolated AI.
workspace_dir = "~/scribe-workspace"

# Give the model sandboxed file tools (write/read/list/mkdir) scoped strictly to
# workspace_dir. The reply streams token by token either way.
tools_enabled = true

[scribe.rag]
# RAG configuration
embedding_model = "intfloat/multilingual-e5-small"
index_dir = "~/.scribe/rag"

[scribe.sme]
# SME configuration
db_path = "~/.scribe/sme"

[scribe.integrations]
# Optional bridges to OTHER local agents/tools. Leave empty (the default) and
# Scribe keeps everything in its own ~/.scribe paths.
#
# Point sme_path/rag_path at another agent's LanceDB to SHARE memory or a
# document library with it — both agents then read and write the same DB.
# brave_env_file is an extra env file to read BRAVE_API_KEY from, if you
# already keep the key somewhere for another tool.
# sme_path = "~/.other-agent/sme"
# rag_path = "~/.other-agent/library/.rag"
# brave_env_file = "~/.other-agent/.env.brave"

[scribe.ui]
# TUI color theme. Switch live in chat with /theme NAME. Options:
#   gruvbox-dark · dracula · tokyo-night · nord · catppuccin · solarized-dark
theme = "gruvbox-dark"
show_progress = true
streaming = true

[scribe.email]
# Email bridge: Scribe can send you mail and accept commands by mail.
# Works with any IMAP/SMTP provider; defaults target Gmail.
#
# Gmail needs an App Password (not your normal password): enable 2-Step
# Verification, then create one at https://myaccount.google.com/apppasswords
# Put it in the SCRIBE_EMAIL_PASSWORD env var (preferred) — never in this file.
enabled = false

# Your mailbox Scribe logs into (send-from and poll-from).
address = ""

# The ONE address allowed to send commands. Replies also go here. Usually you.
approved_sender = ""

# Shared secret that MUST appear in a command subject as [scribe:SECRET].
# From: headers can be spoofed, so this token is the real gate. Empty = command
# intake stays OFF (sending still works).
secret = ""

# Poll cadence for `scribe-llm mail watch`, in seconds.
poll_interval = 30

# Provider servers (Gmail defaults shown).
smtp_host = "smtp.gmail.com"
smtp_port = 587
imap_host = "imap.gmail.com"
imap_port = 993

[scribe.limits]
# Operational limits
max_context_tokens = 131072
max_response_tokens = 8192
request_timeout_seconds = 600

# Hard cap (in words) for the hidden <think> block. Lower = shorter reasoning.
#   ~30 = kratko (default)   ~15 = vrlo kratko   ~8 = minimalno (1 rečenica)
# To turn thinking off entirely, set reasoning = false above.
max_thinking_words = 30

# Models compared by `scribe-llm bench --models` — the grounding leaderboard.
# Each entry is an inline table. base_url/model point at a llama.cpp server
# (one per port) or any OpenAI-compatible endpoint (OpenRouter, Groq, ...).
# api_key_env names an env var holding the key, so no secret lands in this file
# (omit it for local llama.cpp). Results are written to docs/leaderboard.{md,json}.
# Note the quoted header: ["scribe.bench"], matching the other sub-sections.
# ["scribe.bench"]
# models = [
#   { name = "gemma-4-12b", base_url = "http://127.0.0.1:18083/v1", model = "default" },
#   { name = "qwen-2.5-7b", base_url = "http://127.0.0.1:18084/v1", model = "default" },
#   { name = "llama-3.1-8b (openrouter)", base_url = "https://openrouter.ai/api/v1", model = "meta-llama/llama-3.1-8b-instruct", api_key_env = "OPENROUTER_API_KEY" },
# ]

[scribe.web]
# Web UI password/PIN. On first start Scribe prompts for a 4-digit PIN, or
# generates a secure random one if running non-interactively.
# pin = "2020"

# Integrated terminal sandbox enforcement:
# require_sandbox: if true, Scribe will fail-closed and refuse to open
#   the web terminal if Bubblewrap is missing.
require_sandbox = false

# restricted_shell: if require_sandbox is false, Scribe will degrade to
#   running in a restricted shell (rbash) when bubblewrap is missing.
restricted_shell = true

