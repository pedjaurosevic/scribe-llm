<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribe - Research & Writing Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/gruvbox-dark.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --bg-panel: #252525;
            --bg-input: #2d2d2d;
            --border: #3d3d3d;
            --text: #e8e8e8;
            --text-dim: #a0a0a0;
            --accent: #50fa7b;
            --accent2: #8be9fd;
            --warning: #f1fa8c;
            --error: #ff5555;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .header .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-dim);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
        }

        .status-dot.offline {
            background: var(--error);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 1rem;
            overflow: hidden;
        }

        .session-recall {
            background: var(--bg-panel);
            border: 1px solid var(--warning);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .session-recall h3 {
            color: var(--warning);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .session-recall p {
            font-size: 0.875rem;
            color: var(--text-dim);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message .avatar {
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
            color: var(--text-dim);
        }

        .message.user .avatar {
            text-align: right;
        }

        .message .content {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            line-height: 1.6;
        }

        .message.user .content {
            background: var(--accent);
            color: #1a1a1a;
            border-color: var(--accent);
        }

        .message .content pre {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 1rem;
            overflow-x: auto;
            margin: 0.75rem 0;
        }

        .message .content code {
            font-family: 'Fira Code', 'Monaco', monospace;
            font-size: 0.875rem;
        }

        .message .content p code {
            background: rgba(0,0,0,0.3);
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
        }

        .message .content h1, .message .content h2, .message .content h3 {
            margin: 1rem 0 0.5rem;
            color: var(--accent2);
        }

        .message .content ul, .message .content ol {
            margin: 0.5rem 0;
            padding-left: 1.5rem;
        }

        .message .content blockquote {
            border-left: 3px solid var(--warning);
            padding-left: 1rem;
            margin: 0.75rem 0;
            color: var(--text-dim);
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 1rem;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .input-container {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem;
            display: flex;
            gap: 0.75rem;
            margin-top: auto;
        }

        .input-container textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1rem;
            resize: none;
            outline: none;
            font-family: inherit;
            min-height: 24px;
            max-height: 150px;
        }

        .input-container textarea::placeholder {
            color: var(--text-dim);
        }

        .input-container button {
            background: var(--accent);
            color: #1a1a1a;
            border: none;
            border-radius: 8px;
            padding: 0.5rem 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .input-container button:hover {
            opacity: 0.9;
        }

        .input-container button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .clear-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
        }

        .clear-btn:hover {
            border-color: var(--error);
            color: var(--error);
        }

        .stream-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .stream-content code {
            background: rgba(0,0,0,0.4);
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
        }

        .stream-content pre {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 1rem;
            overflow-x: auto;
            margin: 0.75rem 0;
        }

        .stream-content pre code {
            background: transparent;
            padding: 0;
        }

        .message .thinking {
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent2);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .message .thinking summary {
            cursor: pointer;
            color: var(--accent2);
            font-size: 0.75rem;
            user-select: none;
            list-style: none;
        }

        .message .thinking summary::before {
            content: '▸ ';
        }

        .message .thinking[open] summary::before {
            content: '▾ ';
        }

        .message .thinking .thinking-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-top: 0.5rem;
            font-family: 'Fira Code', 'Monaco', monospace;
            line-height: 1.5;
        }

        .message .tool-calls {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            margin-bottom: 0.5rem;
        }

        .message .tool-call {
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 6px;
            padding: 0.4rem 0.6rem;
            font-family: 'Fira Code', 'Monaco', monospace;
            font-size: 0.78rem;
            color: var(--text-dim);
        }

        .message .tool-call .tool-name {
            color: var(--accent);
            font-weight: 600;
        }

        .message .tool-call .tool-result {
            color: var(--text);
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>Scribe</h1>
        <div class="status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Connecting...</span>
            <span style="color: var(--text-dim); margin-left: 1rem;">{{ model_name }}</span>
        </div>
    </header>

    <main class="main">
        {% if session_summary %}
        <div class="session-recall">
            <h3>Previous Session</h3>
            <p>{{ session_summary }}</p>
        </div>
        {% endif %}

        <div class="chat-container" id="chatContainer">
        </div>

        <div class="input-container">
            <textarea id="messageInput" placeholder="Ask Scribe anything..." rows="1"></textarea>
            <button id="sendBtn" onclick="sendMessage()">Send</button>
            <button class="clear-btn" onclick="clearChat()">Clear</button>
        </div>
    </main>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        let ws = null;
        let isConnected = false;
        let isGenerating = false;

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/chat`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                isConnected = true;
                statusDot.classList.remove('offline');
                statusText.textContent = 'Connected';
            };

            ws.onclose = () => {
                isConnected = false;
                statusDot.classList.add('offline');
                statusText.textContent = 'Disconnected';
                setTimeout(connect, 3000);
            };

            ws.onerror = () => {
                statusDot.classList.add('offline');
                statusText.textContent = 'Error';
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                switch(data.type) {
                    case 'status':
                        showTypingIndicator();
                        break;
                    case 'thinking':
                        hideTypingIndicator();
                        updateThinking(data.full);
                        break;
                    case 'tool':
                        hideTypingIndicator();
                        collapseThinking();
                        addToolCall(data);
                        break;
                    case 'chunk':
                        hideTypingIndicator();
                        collapseThinking();
                        updateLastMessage(data.full);
                        break;
                    case 'done':
                        finalizeStreaming();
                        isGenerating = false;
                        sendBtn.disabled = false;
                        break;
                    case 'error':
                        hideTypingIndicator();
                        isGenerating = false;
                        sendBtn.disabled = false;
                        addMessage('assistant', `Error: ${data.content}`);
                        break;
                    case 'cleared':
                        chatContainer.innerHTML = '';
                        break;
                }
            };
        }

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="avatar">${role === 'user' ? 'You' : 'Scribe'}</div>
                <div class="content">${parseMarkdown(content)}</div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function addStreamingMessage() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'streamingMessage';
            div.innerHTML = `
                <div class="avatar">Scribe</div>
                <details class="thinking" id="streamingThinking" style="display:none" open>
                    <summary>razmišljanje</summary>
                    <div class="thinking-content"></div>
                </details>
                <div class="tool-calls" id="streamingTools"></div>
                <div class="content stream-content"></div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function updateLastMessage(content) {
            const streaming = document.getElementById('streamingMessage');
            if (streaming) {
                streaming.querySelector('.content').innerHTML = parseMarkdown(content);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        function updateThinking(content) {
            const thinking = document.getElementById('streamingThinking');
            if (thinking) {
                thinking.style.display = 'block';
                thinking.querySelector('.thinking-content').textContent = content;
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        function collapseThinking() {
            const thinking = document.getElementById('streamingThinking');
            if (thinking && thinking.open) thinking.open = false;
        }

        function escapeHtml(s) {
            const div = document.createElement('div');
            div.textContent = s == null ? '' : String(s);
            return div.innerHTML;
        }

        function addToolCall(data) {
            const tools = document.getElementById('streamingTools');
            if (!tools) return;
            const div = document.createElement('div');
            div.className = 'tool-call';
            div.innerHTML =
                `<span class="tool-name">⚙ ${escapeHtml(data.name)}</span> ` +
                `${escapeHtml(data.args)}<br>` +
                `<span class="tool-result">→ ${escapeHtml(data.result)}</span>`;
            tools.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function finalizeStreaming() {
            // Drop ids so the next streamed message gets fresh elements.
            const msg = document.getElementById('streamingMessage');
            if (msg) msg.removeAttribute('id');
            const thinking = document.getElementById('streamingThinking');
            if (thinking) {
                thinking.open = false;
                thinking.removeAttribute('id');
            }
            const tools = document.getElementById('streamingTools');
            if (tools) tools.removeAttribute('id');
        }

        function showTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="avatar">Scribe</div>
                <div class="content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTypingIndicator() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function parseMarkdown(text) {
            if (typeof marked !== 'undefined') {
                marked.setOptions({
                    highlight: function(code, lang) {
                        if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) {
                            return hljs.highlight(code, { language: lang }).value;
                        }
                        return code;
                    },
                    breaks: true
                });
                return marked.parse(text);
            }
            return text
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="language-$1">$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || !isConnected || isGenerating) return;

            addMessage('user', message);
            messageInput.value = '';
            messageInput.style.height = 'auto';
            isGenerating = true;
            sendBtn.disabled = true;
            addStreamingMessage();

            ws.send(JSON.stringify({ type: 'message', content: message }));
        }

        function clearChat() {
            if (ws && isConnected) {
                ws.send(JSON.stringify({ type: 'clear' }));
            }
        }

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
        });

        connect();
    </script>
</body>
</html>
